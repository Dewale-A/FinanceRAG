<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 550">
  <defs>
    <linearGradient id="ingestGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="embedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="storeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="retrieveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <linearGradient id="llmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899"/>
      <stop offset="100%" style="stop-color:#DB2777"/>
    </linearGradient>
    <linearGradient id="apiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#0891B2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <rect width="1100" height="550" fill="#F8FAFC"/>
  
  <text x="550" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1E293B">FinanceRAG - System Architecture</text>
  <text x="550" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748B">Production-Grade RAG Pipeline for Financial Document Q&amp;A</text>
  
  <!-- Input Section -->
  <rect x="30" y="100" width="120" height="140" rx="10" fill="white" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>
  <text x="90" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#475569">DOCUMENTS</text>
  <text x="90" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748B">PDF</text>
  <text x="90" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748B">DOCX</text>
  <text x="90" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748B">TXT</text>
  <text x="90" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748B">Markdown</text>
  
  <!-- Document Processor -->
  <rect x="180" y="110" width="130" height="60" rx="30" fill="url(#ingestGrad)" filter="url(#shadow)"/>
  <circle cx="215" cy="140" r="14" fill="white" fill-opacity="0.2"/>
  <text x="215" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">1</text>
  <text x="270" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Document</text>
  <text x="270" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Processor</text>
  
  <!-- Chunking note -->
  <rect x="180" y="180" width="130" height="35" rx="5" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="245" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#475569">Chunking: 1000 chars</text>
  <text x="245" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#475569">Overlap: 200 chars</text>
  
  <!-- Embeddings -->
  <rect x="340" y="110" width="130" height="60" rx="30" fill="url(#embedGrad)" filter="url(#shadow)"/>
  <circle cx="375" cy="140" r="14" fill="white" fill-opacity="0.2"/>
  <text x="375" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">2</text>
  <text x="430" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Embeddings</text>
  <text x="430" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Pipeline</text>
  
  <!-- Embeddings model note -->
  <rect x="340" y="180" width="130" height="25" rx="5" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="405" y="197" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#475569">text-embedding-ada-002</text>
  
  <!-- Vector Store -->
  <rect x="500" y="110" width="130" height="60" rx="30" fill="url(#storeGrad)" filter="url(#shadow)"/>
  <circle cx="535" cy="140" r="14" fill="white" fill-opacity="0.2"/>
  <text x="535" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">3</text>
  <text x="590" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Vector</text>
  <text x="590" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Store</text>
  
  <!-- ChromaDB note -->
  <rect x="500" y="180" width="130" height="25" rx="5" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="565" y="197" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#475569">ChromaDB (Persistent)</text>
  
  <!-- Arrows for ingestion flow -->
  <line x1="150" y1="170" x2="180" y2="140" stroke="#94A3B8" stroke-width="2"/>
  <line x1="310" y1="140" x2="340" y2="140" stroke="#94A3B8" stroke-width="2"/>
  <line x1="470" y1="140" x2="500" y2="140" stroke="#94A3B8" stroke-width="2"/>
  
  <!-- Query Section - Lower half -->
  <rect x="30" y="280" width="120" height="80" rx="10" fill="white" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>
  <text x="90" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#475569">USER QUERY</text>
  <text x="90" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748B">"What is the</text>
  <text x="90" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748B">minimum CET1?"</text>
  
  <!-- Query Embedding -->
  <rect x="180" y="280" width="130" height="60" rx="30" fill="url(#embedGrad)" filter="url(#shadow)"/>
  <text x="245" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Query</text>
  <text x="245" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Embedding</text>
  
  <!-- Retriever -->
  <rect x="340" y="280" width="130" height="60" rx="30" fill="url(#retrieveGrad)" filter="url(#shadow)"/>
  <circle cx="375" cy="310" r="14" fill="white" fill-opacity="0.2"/>
  <text x="375" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">4</text>
  <text x="430" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Semantic</text>
  <text x="430" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Retriever</text>
  
  <!-- Retriever note -->
  <rect x="340" y="350" width="130" height="25" rx="5" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="405" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#475569">Top-K Similarity Search</text>
  
  <!-- Connection to vector store -->
  <line x1="565" y1="170" x2="565" y2="250" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="565" y1="250" x2="470" y2="310" stroke="#94A3B8" stroke-width="2"/>
  
  <!-- LLM Chain -->
  <rect x="500" y="280" width="130" height="60" rx="30" fill="url(#llmGrad)" filter="url(#shadow)"/>
  <circle cx="535" cy="310" r="14" fill="white" fill-opacity="0.2"/>
  <text x="535" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">5</text>
  <text x="590" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">LLM</text>
  <text x="590" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Chain</text>
  
  <!-- LLM note -->
  <rect x="500" y="350" width="130" height="25" rx="5" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="565" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#475569">GPT-4o-mini</text>
  
  <!-- FastAPI -->
  <rect x="660" y="280" width="130" height="60" rx="30" fill="url(#apiGrad)" filter="url(#shadow)"/>
  <circle cx="695" cy="310" r="14" fill="white" fill-opacity="0.2"/>
  <text x="695" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">6</text>
  <text x="750" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">FastAPI</text>
  <text x="750" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Endpoint</text>
  
  <!-- API note -->
  <rect x="660" y="350" width="130" height="25" rx="5" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="725" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#475569">REST API + Health</text>
  
  <!-- Output -->
  <rect x="820" y="260" width="140" height="120" rx="10" fill="white" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>
  <text x="890" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#475569">RESPONSE</text>
  <text x="890" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748B">Answer</text>
  <text x="890" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748B">Sources</text>
  <text x="890" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748B">Relevance Scores</text>
  <text x="890" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748B">Metadata</text>
  
  <!-- Query flow arrows -->
  <line x1="150" y1="320" x2="180" y2="310" stroke="#94A3B8" stroke-width="2"/>
  <line x1="310" y1="310" x2="340" y2="310" stroke="#94A3B8" stroke-width="2"/>
  <line x1="470" y1="310" x2="500" y2="310" stroke="#94A3B8" stroke-width="2"/>
  <line x1="630" y1="310" x2="660" y2="310" stroke="#94A3B8" stroke-width="2"/>
  <line x1="790" y1="310" x2="820" y2="310" stroke="#94A3B8" stroke-width="2"/>
  
  <!-- Pipeline Labels -->
  <rect x="30" y="420" width="350" height="60" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="205" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1D4ED8">Ingestion Pipeline (Offline)</text>
  <text x="205" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3B82F6">Documents - Chunk - Embed - Store</text>
  
  <rect x="400" y="420" width="450" height="60" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="625" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400E">Query Pipeline (Real-time)</text>
  <text x="625" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#B45309">Query - Embed - Retrieve - Generate - Respond</text>
  
  <!-- Tech badges -->
  <rect x="870" y="420" width="80" height="28" rx="5" fill="#1E293B"/>
  <text x="910" y="439" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">LangChain</text>
  
  <rect x="960" y="420" width="80" height="28" rx="5" fill="#10A37F"/>
  <text x="1000" y="439" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">OpenAI</text>
  
  <rect x="870" y="455" width="80" height="28" rx="5" fill="#059669"/>
  <text x="910" y="474" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">ChromaDB</text>
  
  <rect x="960" y="455" width="80" height="28" rx="5" fill="#009688"/>
  <text x="1000" y="474" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">FastAPI</text>
</svg>