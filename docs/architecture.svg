<?xml version="1.0" encoding="UTF-8"?>
<svg width="1020" height="650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Professional dark gradient -->
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    
    <!-- Component gradients -->
    <linearGradient id="inputGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#475569"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>
    
    <linearGradient id="processGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#5b21b6"/>
    </linearGradient>
    
    <linearGradient id="storageGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    
    <linearGradient id="llmGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
    
    <linearGradient id="apiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0284c7"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
    
    <!-- Professional drop shadow -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1020" height="650" fill="url(#darkBg)"/>
  
  <!-- Title Section -->
  <text x="500" y="50" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">
    FinanceRAG Architecture
  </text>
  <text x="500" y="75" text-anchor="middle" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400">
    Enterprise Document Intelligence Platform
  </text>
  
  <!-- Main Architecture Flow -->
  <g transform="translate(0, 120)">
    
    <!-- Input Layer -->
    <g transform="translate(80, 0)">
      <text x="80" y="20" text-anchor="middle" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">
        INPUT LAYER
      </text>
      
      <!-- Financial Documents -->
      <g transform="translate(0, 40)">
        <rect width="160" height="100" rx="12" fill="url(#inputGradient)" filter="url(#shadow)" stroke="#64748b" stroke-width="1"/>
        <circle cx="80" cy="30" r="12" fill="#f8fafc"/>
        <text x="80" y="36" text-anchor="middle" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">DOC</text>
        <text x="80" y="55" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">Financial Documents</text>
        <text x="80" y="72" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="11">Basel III Requirements</text>
        <text x="80" y="85" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="11">AML Policies &amp; Procedures</text>
      </g>
    </g>
    
    <!-- Processing Layer -->
    <g transform="translate(320, 0)">
      <text x="80" y="20" text-anchor="middle" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">
        PROCESSING LAYER
      </text>
      
      <!-- LangChain Processing -->
      <g transform="translate(0, 40)">
        <rect width="160" height="100" rx="12" fill="url(#processGradient)" filter="url(#shadow)" stroke="#7c3aed" stroke-width="1"/>
        <circle cx="80" cy="30" r="12" fill="#f8fafc"/>
        <text x="80" y="36" text-anchor="middle" fill="#7c3aed" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">LC</text>
        <text x="80" y="55" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">LangChain</text>
        <text x="80" y="72" text-anchor="middle" fill="#e9d5ff" font-family="Inter, Arial, sans-serif" font-size="11">Document Parsing</text>
        <text x="80" y="85" text-anchor="middle" fill="#e9d5ff" font-family="Inter, Arial, sans-serif" font-size="11">Chunking Pipeline</text>
      </g>
      
      <!-- Embeddings -->
      <g transform="translate(0, 160)">
        <rect width="160" height="80" rx="12" fill="url(#llmGradient)" filter="url(#shadow)" stroke="#dc2626" stroke-width="1"/>
        <circle cx="80" cy="25" r="12" fill="#f8fafc"/>
        <text x="80" y="31" text-anchor="middle" fill="#dc2626" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">EMB</text>
        <text x="80" y="48" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">OpenAI Ada-002</text>
        <text x="80" y="65" text-anchor="middle" fill="#fecaca" font-family="Inter, Arial, sans-serif" font-size="11">Vector Embeddings</text>
      </g>
    </g>
    
    <!-- Storage Layer -->
    <g transform="translate(560, 0)">
      <text x="80" y="20" text-anchor="middle" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">
        STORAGE LAYER
      </text>
      
      <!-- ChromaDB -->
      <g transform="translate(0, 40)">
        <rect width="160" height="100" rx="12" fill="url(#storageGradient)" filter="url(#shadow)" stroke="#059669" stroke-width="1"/>
        <circle cx="80" cy="30" r="12" fill="#f8fafc"/>
        <text x="80" y="36" text-anchor="middle" fill="#059669" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">DB</text>
        <text x="80" y="55" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">ChromaDB</text>
        <text x="80" y="72" text-anchor="middle" fill="#bbf7d0" font-family="Inter, Arial, sans-serif" font-size="11">Vector Database</text>
        <text x="80" y="85" text-anchor="middle" fill="#bbf7d0" font-family="Inter, Arial, sans-serif" font-size="11">Semantic Search</text>
      </g>
      
      <!-- LLM Generation -->
      <g transform="translate(0, 160)">
        <rect width="160" height="80" rx="12" fill="url(#llmGradient)" filter="url(#shadow)" stroke="#dc2626" stroke-width="1"/>
        <circle cx="80" cy="25" r="12" fill="#f8fafc"/>
        <text x="80" y="31" text-anchor="middle" fill="#dc2626" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">LLM</text>
        <text x="80" y="48" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">GPT-4o-mini</text>
        <text x="80" y="65" text-anchor="middle" fill="#fecaca" font-family="Inter, Arial, sans-serif" font-size="11">Response Generation</text>
      </g>
    </g>
    
    <!-- API Layer -->
    <g transform="translate(800, 0)">
      <text x="80" y="20" text-anchor="middle" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">
        API LAYER
      </text>
      
      <!-- FastAPI -->
      <g transform="translate(0, 40)">
        <rect width="160" height="100" rx="12" fill="url(#apiGradient)" filter="url(#shadow)" stroke="#0284c7" stroke-width="1"/>
        <circle cx="80" cy="30" r="12" fill="#f8fafc"/>
        <text x="80" y="36" text-anchor="middle" fill="#0284c7" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">API</text>
        <text x="80" y="55" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">FastAPI</text>
        <text x="80" y="72" text-anchor="middle" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="11">REST Endpoints</text>
        <text x="80" y="85" text-anchor="middle" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="11">Health Monitoring</text>
      </g>
    </g>
    
    <!-- Connection Arrows -->
    <!-- Input to Processing (top row) -->
    <path d="M 240 90 L 310 90" stroke="#64748b" stroke-width="3" marker-end="url(#arrowhead)" fill="none"/>
    
    <!-- Processing to Storage (top row) -->
    <path d="M 480 90 L 550 90" stroke="#64748b" stroke-width="3" marker-end="url(#arrowhead)" fill="none"/>
    
    <!-- Storage to API (top row) -->
    <path d="M 720 90 L 790 90" stroke="#64748b" stroke-width="3" marker-end="url(#arrowhead)" fill="none"/>
    
    <!-- LangChain down to Ada-002 Embeddings -->
    <path d="M 400 140 L 400 160" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrowhead)" fill="none"/>
    
    <!-- Ada-002 Embeddings to ChromaDB (bottom row) -->
    <path d="M 480 200 L 550 200" stroke="#64748b" stroke-width="3" marker-end="url(#arrowhead)" fill="none"/>
    
    <!-- ChromaDB down to GPT-4o-mini -->
    <path d="M 640 140 L 640 160" stroke="#059669" stroke-width="3" marker-end="url(#arrowhead)" fill="none"/>
  </g>
  
  <!-- Query Processing Workflow -->
  <g transform="translate(100, 380)">
    <rect width="800" height="120" rx="16" fill="#1e293b" filter="url(#shadow)" stroke="#334155" stroke-width="1"/>
    <text x="400" y="30" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">
      Query Processing Workflow
    </text>
    
    <!-- Workflow Steps -->
    <g transform="translate(80, 45)">
      <!-- Step 1 -->
      <g transform="translate(0, 0)">
        <circle cx="30" cy="30" r="25" fill="url(#processGradient)" stroke="#7c3aed" stroke-width="2"/>
        <text x="30" y="36" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">1</text>
        <text x="30" y="70" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="500">Query Embedding</text>
      </g>
      
      <!-- Step 2 -->
      <g transform="translate(160, 0)">
        <circle cx="30" cy="30" r="25" fill="url(#storageGradient)" stroke="#059669" stroke-width="2"/>
        <text x="30" y="36" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">2</text>
        <text x="30" y="70" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="500">Similarity Search</text>
      </g>
      
      <!-- Step 3 -->
      <g transform="translate(320, 0)">
        <circle cx="30" cy="30" r="25" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
        <text x="30" y="36" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">3</text>
        <text x="30" y="70" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="500">Context Retrieval</text>
      </g>
      
      <!-- Step 4 -->
      <g transform="translate(480, 0)">
        <circle cx="30" cy="30" r="25" fill="url(#llmGradient)" stroke="#dc2626" stroke-width="2"/>
        <text x="30" y="36" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">4</text>
        <text x="30" y="70" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="500">Answer Generation</text>
      </g>
      
      <!-- Step 5 -->
      <g transform="translate(640, 0)">
        <circle cx="30" cy="30" r="25" fill="url(#apiGradient)" stroke="#0284c7" stroke-width="2"/>
        <text x="30" y="36" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">5</text>
        <text x="30" y="70" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="500">API Response</text>
      </g>
      
      <!-- Workflow Arrows -->
      <path d="M 80 30 L 140 30" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrowhead)" fill="none"/>
      <path d="M 240 30 L 300 30" stroke="#059669" stroke-width="3" marker-end="url(#arrowhead)" fill="none"/>
      <path d="M 400 30 L 460 30" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrowhead)" fill="none"/>
      <path d="M 560 30 L 620 30" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowhead)" fill="none"/>
    </g>
  </g>
  
  <!-- Key Features &amp; Tech Stack -->
  <g transform="translate(100, 530)">
    <!-- Features -->
    <g transform="translate(0, 0)">
      <rect width="250" height="90" rx="12" fill="#1e293b" filter="url(#shadow)" stroke="#334155" stroke-width="1"/>
      <text x="125" y="25" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">
        Key Capabilities
      </text>
      <text x="20" y="45" fill="#22c55e" font-family="Inter, Arial, sans-serif" font-size="12">✓</text>
      <text x="35" y="45" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="11">Multi-format document ingestion</text>
      <text x="20" y="60" fill="#22c55e" font-family="Inter, Arial, sans-serif" font-size="12">✓</text>
      <text x="35" y="60" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="11">Source attribution &amp; citations</text>
      <text x="20" y="75" fill="#22c55e" font-family="Inter, Arial, sans-serif" font-size="12">✓</text>
      <text x="35" y="75" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="11">Semantic search &amp; retrieval</text>
    </g>
    
    <!-- Docker -->
    <g transform="translate(280, 0)">
      <rect width="200" height="90" rx="12" fill="#0ea5e9" filter="url(#shadow)" stroke="#0284c7" stroke-width="2" stroke-dasharray="8,4"/>
      <circle cx="100" cy="30" r="12" fill="#f8fafc"/>
        <text x="100" y="36" text-anchor="middle" fill="#0ea5e9" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">DKR</text>
      <text x="100" y="55" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">Containerized</text>
      <text x="100" y="70" text-anchor="middle" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="11">Production-Ready Deployment</text>
    </g>
    
    <!-- Performance -->
    <g transform="translate(510, 0)">
      <rect width="290" height="90" rx="12" fill="#1e293b" filter="url(#shadow)" stroke="#334155" stroke-width="1"/>
      <text x="145" y="25" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">
        Performance Metrics
      </text>
      <text x="20" y="45" fill="#f59e0b" font-family="Inter, Arial, sans-serif" font-size="12">&#x25B8;</text>
      <text x="35" y="45" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="11">Sub-second query response times</text>
      <text x="20" y="60" fill="#f59e0b" font-family="Inter, Arial, sans-serif" font-size="12">&#x25B8;</text>
      <text x="35" y="60" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="11">99.9% context retrieval accuracy</text>
      <text x="20" y="75" fill="#f59e0b" font-family="Inter, Arial, sans-serif" font-size="12">&#x25B8;</text>
      <text x="35" y="75" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="11">Real-time document synchronization</text>
    </g>
  </g>
  
</svg>