name: CI - Run Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_financerag
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_financerag
          LLM_MODEL: gpt-4o-mini
          EMBEDDING_MODEL: text-embedding-ada-002
        run: |
          pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t financerag:test .

      - name: Test Docker image starts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          docker run -d --name test-container \
            -e OPENAI_API_KEY=$OPENAI_API_KEY \
            -e DATABASE_URL=sqlite:///test.db \
            -p 8001:8000 \
            financerag:test
          sleep 10
          curl -f http://localhost:8001/health || (docker logs test-container && exit 1)
          docker stop test-container
